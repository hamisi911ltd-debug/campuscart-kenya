<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- App Title and Description -->
    <title>CampusMart Kenya - Student Marketplace</title>
    <meta name="description" content="Student marketplace for buying and selling on Kenyan university campuses. Find electronics, fashion, food, furniture and more." />
    <meta name="author" content="CampusMart Kenya" />
    <meta name="keywords" content="campus, marketplace, students, kenya, university, buy, sell, electronics, fashion" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#7CB342" />
    <meta name="msapplication-TileColor" content="#7CB342" />
    <meta name="msapplication-navbutton-color" content="#7CB342" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- PWA Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CampusMart" />
    <link rel="apple-touch-icon" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="96x96" href="/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="384x384" href="/icon-384x384.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png" />
    
    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" href="/icon-512x512.png" />
    
    <!-- Standard Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-72x72.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-72x72.png" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="CampusMart Kenya - Student Marketplace" />
    <meta property="og:description" content="Student marketplace for buying and selling on Kenyan university campuses" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512x512.png" />
    <meta property="og:url" content="https://campusmart.ke" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CampusMart Kenya" />
    <meta name="twitter:description" content="Student marketplace for buying and selling on Kenyan university campuses" />
    <meta name="twitter:image" content="/icon-512x512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
