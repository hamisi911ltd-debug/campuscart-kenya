<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Cache - CampusMart</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #7CB342 0%, #558B2F 100%);
      min-height: 100vh;
      color: white;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      color: #333;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      color: #7CB342;
      margin-top: 0;
    }
    button {
      background: #7CB342;
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 0.5rem;
      cursor: pointer;
      width: 100%;
      margin: 0.5rem 0;
    }
    button:hover {
      background: #558B2F;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      margin: 1rem 0;
      padding: 1rem;
      border-radius: 0.5rem;
      background: #f5f5f5;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
    }
    ul {
      text-align: left;
      margin: 1rem 0;
    }
    li {
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Clear Cache & Fix Issues</h1>
    
    <p>If you're seeing old content or errors, use these tools to clear your cache:</p>
    
    <div id="status"></div>
    
    <button onclick="clearAllCaches()">Clear All Caches</button>
    <button onclick="unregisterServiceWorkers()">Unregister Service Workers</button>
    <button onclick="clearLocalStorage()">Clear Local Storage</button>
    <button onclick="clearEverything()">🔥 Clear Everything & Reload</button>
    
    <div class="status info">
      <strong>What gets cleared:</strong>
      <ul>
        <li>Service Worker caches (v1, v2, v3, v4)</li>
        <li>Browser cache</li>
        <li>Local storage data</li>
        <li>Session storage</li>
        <li>Service worker registrations</li>
      </ul>
    </div>
    
    <button onclick="goHome()" style="background: #666;">← Back to CampusMart</button>
  </div>

  <script>
    const status = document.getElementById('status');
    
    function showStatus(message, type = 'info') {
      status.innerHTML = `<div class="status ${type}">${message}</div>`;
    }
    
    async function clearAllCaches() {
      try {
        showStatus('Clearing caches...', 'info');
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
        showStatus(`✅ Cleared ${cacheNames.length} cache(s): ${cacheNames.join(', ')}`, 'success');
      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
      }
    }
    
    async function unregisterServiceWorkers() {
      try {
        showStatus('Unregistering service workers...', 'info');
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(reg => reg.unregister()));
        showStatus(`✅ Unregistered ${registrations.length} service worker(s)`, 'success');
      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
      }
    }
    
    function clearLocalStorage() {
      try {
        showStatus('Clearing local storage...', 'info');
        const count = localStorage.length;
        localStorage.clear();
        sessionStorage.clear();
        showStatus(`✅ Cleared ${count} local storage item(s)`, 'success');
      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
      }
    }
    
    async function clearEverything() {
      try {
        showStatus('Clearing everything...', 'info');
        
        // Clear caches
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
        
        // Unregister service workers
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(reg => reg.unregister()));
        
        // Clear storage
        localStorage.clear();
        sessionStorage.clear();
        
        showStatus('✅ Everything cleared! Reloading in 2 seconds...', 'success');
        
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
      }
    }
    
    function goHome() {
      window.location.href = '/';
    }
    
    // Show current cache info on load
    (async () => {
      try {
        const cacheNames = await caches.keys();
        const registrations = await navigator.serviceWorker.getRegistrations();
        const localStorageCount = localStorage.length;
        
        showStatus(`
          <strong>Current Status:</strong><br>
          📦 Caches: ${cacheNames.length} (${cacheNames.join(', ') || 'none'})<br>
          🔧 Service Workers: ${registrations.length}<br>
          💾 Local Storage Items: ${localStorageCount}
        `, 'info');
      } catch (error) {
        showStatus('Could not load cache info', 'error');
      }
    })();
  </script>
</body>
</html>
