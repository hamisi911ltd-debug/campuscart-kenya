# Cloudflare Pages configuration for CampusMart

name = "campusmart-kenya"
pages_build_output_dir = "dist"
compatibility_date = "2026-04-30"

# D1 Database binding (if using Cloudflare D1)
[[d1_databases]]
binding = "DB"
database_name = "campusmart"
database_id = "55923843-deae-48c4-b8db-99b244dd5005"

# R2 Bucket binding (for image storage)
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "campusmart-storage"
